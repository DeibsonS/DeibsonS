<!-- animated snake -->
<g filter="url(#glow)">

<!-- snake body -->
<circle r="11" fill="#39d353">
  <animate attributeName="cx" values="820;870;930;980;1040;1100;1040;980;930;870;820" dur="8s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="170;150;170;150;170;150;170;190;170;190;170" dur="8s" repeatCount="indefinite"/>
</circle>

<circle r="8" fill="#2ea043" opacity="0.9">
  <animate attributeName="cx" values="790;840;900;950;1010;1070;1010;950;900;840;790" dur="8s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="170;150;170;150;170;150;170;190;170;190;170" dur="8s" repeatCount="indefinite"/>
</circle>

<circle r="6" fill="#26a641" opacity="0.8">
  <animate attributeName="cx" values="760;810;870;920;980;1040;980;920;870;810;760" dur="8s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="170;150;170;150;170;150;170;190;170;190;170" dur="8s" repeatCount="indefinite"/>
</circle>

<!-- snake eye -->
<circle r="2" fill="#ffffff">
  <animate attributeName="cx" values="823;873;933;983;1043;1103;1043;983;933;873;823" dur="8s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="167;147;167;147;167;147;167;187;167;187;167" dur="8s" repeatCount="indefinite"/>
</circle>

<!-- apple -->
<circle cx="1135" cy="155" r="5" fill="#ff4444">
  <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
</circle>

</g>

<!-- footer -->
<text x="50%" y="260" text-anchor="middle"
fill="#8b949e"
