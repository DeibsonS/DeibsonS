<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">

  <rect width="1200" height="300" fill="#0d1117"/>

  <!-- Glow -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background dots -->
  <g opacity="0.18">

    <rect x="50" y="40" width="12" height="12" fill="#39d353"/>
    <rect x="120" y="80" width="12" height="12" fill="#39d353"/>
    <rect x="190" y="50" width="12" height="12" fill="#39d353"/>
    <rect x="300" y="100" width="12" height="12" fill="#39d353"/>
    <rect x="450" y="70" width="12" height="12" fill="#39d353"/>
    <rect x="600" y="40" width="12" height="12" fill="#39d353"/>
    <rect x="800" y="90" width="12" height="12" fill="#39d353"/>
    <rect x="980" y="60" width="12" height="12" fill="#39d353"/>

  </g>

  <!-- COBOL -->
  <text
    x="50%"
    y="120"
    text-anchor="middle"
    fill="#39d353"
    font-size="80"
    font-family="monospace"
    filter="url(#glow)">

    COBOL

  </text>

  <!-- Snake -->
  <g filter="url(#glow)">

    <!-- Body -->
    <circle r="11" fill="#39d353">
      <animate attributeName="cx"
        values="150;250;350;450;550;650;750;850;950"
        dur="6s"
        repeatCount="indefinite"/>

      <animate attributeName="cy"
        values="220;200;220;200;220;200;220;200;220"
        dur="6s"
        repeatCount="indefinite"/>
    </circle>

    <circle r="8" fill="#2ea043" opacity="0.9">
      <animate attributeName="cx"
        values="120;220;320;420;520;620;720;820;920"
        dur="6s"
        repeatCount="indefinite"/>

      <animate attributeName="cy"
        values="220;200;220;200;220;200;220;200;220"
        dur="6s"
        repeatCount="indefinite"/>
    </circle>

    <circle r="6" fill="#26a641" opacity="0.8">
      <animate attributeName="cx"
        values="90;190;290;390;490;590;690;790;890"
        dur="6s"
        repeatCount="indefinite"/>

      <animate attributeName="cy"
        values="220;200;220;200;220;200;220;200;220"
        dur="6s"
        repeatCount="indefinite"/>
    </circle>

    <!-- Eye -->
    <circle r="2" fill="white">
      <animate attributeName="cx"
        values="153;253;353;453;553;653;753;853;953"
        dur="6s"
        repeatCount="indefinite"/>

      <animate attributeName="cy"
        values="217;197;217;197;217;197;217;197;217"
        dur="6s"
        repeatCount="indefinite"/>
    </circle>

  </g>

  <!-- Footer -->
  <text
    x="50%"
    y="280"
    text-anchor="middle"
    fill="#8b949e"
    font-size="24"
    font-family="monospace">

    Transformando aprendizado em soluções reais.

  </text>

</svg>
